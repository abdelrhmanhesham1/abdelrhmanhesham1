name: Update dynamic README stats

on:
  schedule:
    - cron: "0 6 * * *" # daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Update projects-shipped count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh api "users/${{ github.repository_owner }}" --jq '.public_repos')
          sed -i "s|<!--PROJECTS_SHIPPED-->.*<!--/PROJECTS_SHIPPED-->|<!--PROJECTS_SHIPPED-->${COUNT}<!--/PROJECTS_SHIPPED-->|" README.md

      - name: Commit & push if changed
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update projects-shipped count"
            git push
          fi
