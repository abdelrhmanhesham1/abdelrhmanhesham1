name: Generate aviation contribution visualizations

on:
  schedule:
    - cron: "0 7 * * *" # daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Generate the real Platane/snk snake (unmodified)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate flight path (plane + real snake, combined)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        run: python scripts/generate_flight_path.py

      - name: Generate radar scope SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        run: python scripts/generate_radar.py

      - name: Commit & push if changed
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add flight-path/ radar/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: regenerate aviation contribution visualizations"
            git push
          fi
